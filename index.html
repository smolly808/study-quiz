    @keyframes pop {

      100% { box-shadow: 0 0 0 rgba(255,23,68,0.0); }

<script>
  // ★あなたのexec URLに置き換え
  const API_BASE = "https://script.google.com/macros/s/AKfycby_XupzA1UK5gauggJylLRDfK7NaCJPaul24MkHcceFa9ywBWNu8wLf3vHy3S0T57IHJg/exec";

  // =========================
  // 学習履歴（端末内）
  // =========================
  const STATS_KEY = "quiz_stats_v1"; // { [id]: {ok, ng, lastAt} }

  function loadStats() {
    try { return JSON.parse(localStorage.getItem(STATS_KEY) || "{}"); }
    catch { return {}; }
  }
  function saveStats(stats) {
    localStorage.setItem(STATS_KEY, JSON.stringify(stats));
  }
  function recordAttempt(q, ok) {
    const id = String(q.id ?? "");
    if (!id) return;
    const stats = loadStats();
    const cur = stats[id] || { ok: 0, ng: 0, lastAt: 0 };
    if (ok) cur.ok += 1; else cur.ng += 1;
    cur.lastAt = Date.now();
    stats[id] = cur;
    saveStats(stats);
  }
  function resetStats() {
    localStorage.removeItem(STATS_KEY);
  }

  function summarizeStatsForPool(pool) {
    const stats = loadStats();
    let seen = 0, ok = 0, ng = 0;
    let wrongQ = 0;
    for (const q of pool) {
      const id = String(q.id ?? "");
      const s = stats[id];
      if (!s) continue;
      seen += 1;
      ok += (s.ok || 0);
      ng += (s.ng || 0);
      if ((s.ng || 0) > 0) wrongQ += 1;
    }
    return { seen, ok, ng, wrongQ };
  }

  function isWrongQuestion(q) {
    const id = String(q.id ?? "");
    if (!id) return false;
    const s = loadStats()[id];
    return !!(s && (s.ng || 0) > 0);
  }

  function isViewMode() {
    return currentSessionMode === "view";
  }

  function getQuestionStats(q) {
    const id = String(q.id ?? "");
    const s = loadStats()[id] || { ok: 0, ng: 0, lastAt: 0 };
    const ok = Number(s.ok || 0);
    const ng = Number(s.ng || 0);
    return { ok, total: ok + ng, ng };
  }

  function buildWeightedItems(pool, mode) {
    const stats = loadStats();

    if (mode === "off") {
      return pool.map(q => ({ q, w: 1 }));
    }

    if (mode === "strong") {
      return pool.map(q => {
        const id = String(q.id ?? "");
        const s = stats[id] || { ok: 0, ng: 0, lastAt: 0 };

        const ok = Number(s.ok || 0);
        const ng = Number(s.ng || 0);
        const total = ok + ng;
        const wrongRate = total > 0 ? (ng / total) : 0;

        const recentHours = (Date.now() - (s.lastAt || 0)) / 36e5;
        const recentBoost = (ng > 0 && recentHours <= 24) ? 0.4 : 0;

        const w = 1 + 3.0 * wrongRate + 1.3 * Math.min(5, ng) / 5 + recentBoost;
        return { q, w: Math.max(0.2, w) };
      });
    }

    if (mode === "mid") {
      const rows = pool.map(q => {
        const id = String(q.id ?? "");
        const s = stats[id] || { ok: 0, ng: 0, lastAt: 0 };

        const ok = Number(s.ok || 0);
        const ng = Number(s.ng || 0);
        const total = ok + ng;
        const acc = total > 0 ? (ok / total) : -1; // 未出題は最優先側

        return { q, ok, ng, total, acc };
      });

      const maxTotal = rows.reduce((m, x) => Math.max(m, x.total), 0);
      const threshold = maxTotal / 2;

      return rows.map(x => {
        const underHalf = x.total <= threshold ? 1 : 0;
        const accPriority = (x.acc < 0) ? 1 : (1 - x.acc);
        const fewPriority = 1 / (x.total + 1);

        const w =
          1000 * underHalf +   // ① 最多出題数の半分以下を最優先
          100 * accPriority +  // ② 正答率が低いものを優先
          10 * fewPriority;    // ③ 正答率が同じなら出題数が少ないものを優先

        return { q: x.q, w };
      });
    }

    return pool.map(q => ({ q, w: 1 }));
  }

  function sampleWeightedUnique(pool, n, mode) {
    const items = buildWeightedItems(pool, mode).slice();
    const picked = [];
    const N = Math.min(n, items.length);

    for (let i = 0; i < N; i++) {
      const sum = items.reduce((a, x) => a + x.w, 0);
      let r = Math.random() * sum;
      let idx = -1;
      for (let j = 0; j < items.length; j++) {
        r -= items[j].w;
        if (r <= 0) { idx = j; break; }
      }
      if (idx < 0) idx = items.length - 1;
      picked.push(items[idx].q);
      items.splice(idx, 1);
    }
    return picked;
  }

// =========================
// グループ出題（group_id / group_order）
// =========================
function normGroupId(v) {
  const s = String(v ?? "").trim();
  return s ? s : "";
}

function toNumOrInf(v, fallback = Infinity) {
  const n = Number(String(v ?? "").trim());
  return Number.isFinite(n) ? n : fallback;
}

// pool（現在の出題範囲）から、選ばれた起点リストを「グループ連続」ルールで展開して quizList を作る
function expandPickedWithGroups(picked, pool) {
  const byId = new Map(); // id -> question
  for (const q of pool) {
    const id = String(q.id ?? "").trim();
    if (id) byId.set(id, q);
  }

  const added = new Set();      // 既にquizListに入れた question.id
  const addedGroup = new Set(); // 既に処理した group_id

  const out = [];

  for (const base of picked) {
    const gid = normGroupId(base.group_id);
    const baseId = String(base.id ?? "").trim();

    // グループ無し → そのまま1問
    if (!gid) {
      if (baseId && !added.has(baseId)) {
        out.push(base);
        added.add(baseId);
      }
      continue;
    }

    // 既にそのgroup_idを展開済みならスキップ
    if (addedGroup.has(gid)) continue;
    addedGroup.add(gid);

    // pool内の同一 group_id を全部集める
    const members = pool
      .filter(q => normGroupId(q.group_id) === gid)
      .slice()
      .sort((a, b) => {
        const ao = toNumOrInf(a.group_order, Infinity);
        const bo = toNumOrInf(b.group_order, Infinity);
        if (ao !== bo) return ao - bo;

        // orderが同じ/空のときの安定化：id昇順
        const aid = String(a.id ?? "").trim();
        const bid = String(b.id ?? "").trim();
        const an = Number(aid), bn = Number(bid);
        const aIsNum = Number.isFinite(an), bIsNum = Number.isFinite(bn);
        if (aIsNum && bIsNum) return an - bn;
        if (aIsNum && !bIsNum) return -1;
        if (!aIsNum && bIsNum) return 1;
        return aid.localeCompare(bid, "ja");
      });

    // ★必ず group_order=1 から始めたい
    // もし1が無いなら、ソート先頭から（運用上は1を入れるの推奨）
    let startIndex = 0;
    const idx1 = members.findIndex(q => toNumOrInf(q.group_order, Infinity) === 1);
    if (idx1 >= 0) startIndex = idx1;

    for (let i = startIndex; i < members.length; i++) {
      const q = members[i];
      const id = String(q.id ?? "").trim();
      if (!id || added.has(id)) continue;
      out.push(q);
      added.add(id);
    }
  }

  return out;
}

// 学習分析（教科別・節別・不得意節）
// =========================
const SUBJECTS = [
  { key: "history", label: "歴史" },
  { key: "geography", label: "地理" },
  { key: "science", label: "理科" },
  { key: "art", label: "美術" },

];

const analytics = {
  btn: document.getElementById("analyticsBtn"),
  status: document.getElementById("analyticsStatus"),

  chartSection: document.getElementById("chartSection"),

// 全教科の問題一覧を取得（分析用）
async function fetchAllQuestionsForAnalytics() {
  const all = [];
  for (const s of SUBJECTS) {
    analytics.status.textContent = `分析用データ取得中…（${s.label}）`;
    const json = await fetchJSONP(qs({ subject: s.key }));
    const data = (json && json.data) ? json.data : [];
    // subject列が無い/揺れる場合に備えて補完
    for (const q of data) {
      if (!q.subject) q.subject = s.key;
    }
    all.push(...data);
  }
  analytics.status.textContent = `分析用データ取得完了（${all.length}問）`;
  return all;
}

// 集計
function buildAnalytics(allQuestions) {
  const stats = loadStats();

  // 教科別
  const bySubject = new Map(); // key -> { attempts, wrong }
  for (const s of SUBJECTS) bySubject.set(s.key, { attempts: 0, wrong: 0 });

  // 節別（教科×節）
  const bySection = new Map(); // `${subject}||${unit_big}||${unit_section}` -> { attempts, wrong, subject, unit_big, unit_section }

  // id->question（紐付け）
  const byId = new Map();
  for (const q of allQuestions) {
    const id = String(q.id ?? "");
    if (id) byId.set(id, q);
  }

  // statsのある問題だけ集計（学習したもの）
  for (const [id, s] of Object.entries(stats)) {
    const q = byId.get(String(id));
    if (!q) continue;

    const subject = String(q.subject || "").toLowerCase();
    const attempts = Number(s.ok || 0) + Number(s.ng || 0);
    const wrong = Number(s.ng || 0);

    if (!bySubject.has(subject)) bySubject.set(subject, { attempts: 0, wrong: 0 });
    bySubject.get(subject).attempts += attempts;
    bySubject.get(subject).wrong += wrong;

    const key = `${subject}||${String(q.unit_big||"")}||${String(q.unit_section||"")}`;
    if (!bySection.has(key)) {
      bySection.set(key, {
        subject,
        unit_big: String(q.unit_big||""),
        unit_section: String(q.unit_section||""),
        attempts: 0,
        wrong: 0
      });
    }
    const sec = bySection.get(key);
    sec.attempts += attempts;
    sec.wrong += wrong;
  }

  return { bySubject, bySection };
}

// 超シンプル棒グラフ（canvas）
function drawBarChart(canvas, items, titleRightText = "") {
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // 背景
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, W, H);

  const pad = 30;
  const innerW = W - pad*2;
  const innerH = H - pad*2;

  // タイトル右上
  ctx.fillStyle = "#666";
  ctx.font = "12px system-ui";
  if (titleRightText) ctx.fillText(titleRightText, W - pad - ctx.measureText(titleRightText).width, 18);

  const maxVal = Math.max(1, ...items.map(x => x.value));
  const barW = items.length ? (innerW / items.length) : innerW;

  // 軸
  ctx.strokeStyle = "#eee";
  ctx.beginPath();
  ctx.moveTo(pad, H - pad);
  ctx.lineTo(W - pad, H - pad);
  ctx.stroke();

  // バー
  items.forEach((it, i) => {
    const x = pad + i * barW + 6;
    const w = Math.max(6, barW - 12);
    const h = Math.round((it.value / maxVal) * (innerH - 20));
    const y = (H - pad) - h;

    // バー色（固定しない方針にしたい場合は灰で統一）
    ctx.fillStyle = "#111";
    ctx.globalAlpha = 0.85;
    ctx.fillRect(x, y, w, h);
    ctx.globalAlpha = 1;

    // 値
    ctx.fillStyle = "#111";
    ctx.font = "12px system-ui";
    const vText = String(it.value);
    ctx.fillText(vText, x, y - 4);

    // ラベル（短く）
    ctx.fillStyle = "#666";
    ctx.font = "11px system-ui";
    const label = it.label.length > 6 ? it.label.slice(0, 6) + "…" : it.label;
    ctx.fillText(label, x, H - 12);
  });
}

  function qs(params) {
    const u = new URL(API_BASE);
    Object.entries(params).forEach(([k,v]) => {
      if (v !== undefined && v !== null && String(v).trim() !== "") u.searchParams.set(k, v);
    });
    u.searchParams.set("_t", Date.now().toString());
    return u.toString();
  }

  function fetchJSONP(url) {
    return new Promise((resolve, reject) => {
      const cbName = "jsonp_cb_" + Math.random().toString(36).slice(2);
      const u = new URL(url);
      u.searchParams.set("callback", cbName);

      const script = document.createElement("script");
      script.src = u.toString();

      window[cbName] = (data) => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error("JSONP load failed")); };

      function cleanup() { delete window[cbName]; script.remove(); }
      document.body.appendChild(script);
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function uniqSortUnits(items) {
    const map = new Map();
    for (const it of items) {
      const name = (it.unit_big ?? "").toString().trim();
      if (!name) continue;
      const order = Number(it.unit_big_order);
      if (!map.has(name)) map.set(name, {name, order: Number.isFinite(order) ? order : 9999});
    }
    return Array.from(map.values())
      .sort((a,b) => a.order - b.order || a.name.localeCompare(b.name,'ja'))
      .map(x => x.name);
  }

  function uniqSortSections(items, unitBig) {
    const map = new Map();
    for (const it of items) {
      const big = (it.unit_big ?? "").toString().trim();
      if (big !== unitBig) continue;
      const sec = (it.unit_section ?? "").toString().trim();
      if (!sec) continue;
      const order = Number(it.unit_section_order);
      if (!map.has(sec)) map.set(sec, {sec, order: Number.isFinite(order) ? order : 9999});
    }
    return Array.from(map.values())
      .sort((a,b) => a.order - b.order || a.sec.localeCompare(b.sec,'ja'))
      .map(x => x.sec);
  }

  function fxOn() { return els.fxMode.value !== "off"; }

  function vibrate(pattern) {
    if (!fxOn()) return;
    if (navigator && typeof navigator.vibrate === "function") {
      try { navigator.vibrate(pattern); } catch {}
    }
  }

  let audioCtx = null;
  function beep(freq, durationMs, type = "sine", gain = 0.06) {
    if (!fxOn()) return;
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const t0 = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);

      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + durationMs / 1000);

      osc.connect(g);
      g.connect(audioCtx.destination);

      osc.start(t0);
      osc.stop(t0 + durationMs / 1000 + 0.02);
    } catch {}
  }

  function soundOk() {
    beep(880, 90, "sine", 0.07);
    setTimeout(() => beep(1175, 110, "sine", 0.07), 110);
  }
  function soundNg() {
    beep(220, 140, "triangle", 0.06);
  }

  function applyFx(ok) {
    if (!fxOn()) return;
    els.feedback.classList.remove("fx-ok", "fx-ng");
    void els.feedback.offsetWidth;
    els.feedback.classList.add(ok ? "fx-ok" : "fx-ng");
  }

  function streakHtml() {

    return `<div class="streak"><span class="fire">連続正解：${streak}${fire}</span>（最高：${bestStreak}）</div>`;
  }

  function afterGrade(q, ok, type) {
    results.push({ ok, q: q.question, unit_big: q.unit_big, unit_section: q.unit_section });

    if (!isViewMode()) {

  function gradeMCQ(q, picked) {

    applyFx(ok);

function startQuiz() {
  let pool = currentPool();
  const mode = els.weakMode.value;
  const sessionMode = els.sessionMode.value;
  currentSessionMode = sessionMode;

  if (pool.length === 0) {
    alert("この条件の問題がありません。問題を追加するか、条件を変えてください。");
    return;
  }

  // 「間違えた問題だけ」フィルタ（全て通しでも適用）
  if (sessionMode === "wrongOnly") {
    const wrongPool = pool.filter(isWrongQuestion);
    if (wrongPool.length === 0) {
      alert("この範囲では「間違えた問題」がまだありません。まず通常モードで解いて履歴を作ってください。");
      return;
    }
    pool = wrongPool;
  }

  // ★ 全て通し（ID昇順で、範囲内の全問を出題）
  if (mode === "all") {
    // id を数値優先で昇順、同値や非数値は文字列比較で安定化
    const sorted = [...pool].sort((a, b) => {
      const aRaw = (a.id ?? "").toString().trim();
      const bRaw = (b.id ?? "").toString().trim();
      const aNum = Number(aRaw);
      const bNum = Number(bRaw);
      const aIsNum = Number.isFinite(aNum);
      const bIsNum = Number.isFinite(bNum);

      if (aIsNum && bIsNum) return aNum - bNum;
      if (aIsNum && !bIsNum) return -1;
      if (!aIsNum && bIsNum) return 1;
      return aRaw.localeCompare(bRaw, "ja");
    });

    quizList = sorted;              // ← 全問
  } else {
    // 従来どおり（ランダム／苦手優先）→ 起点をn問選んでからグループ展開
    const n = Math.max(1, Math.min(50, Number(els.numQ.value || 10)));
    const picked = sampleWeightedUnique(pool, n, mode);

    // ★ここが追加：group_id が当たったら group_order 1→最後まで連続で出す
    quizList = expandPickedWithGroups(picked, pool);
  }

  idx = 0;
  correct = 0;
  results = [];
  streak = 0;
  bestStreak = 0;

  show(els.setup, false);
  show(els.result, false);
  show(els.quiz, true);

  renderQuestion(quizList[0]);
}

    const { bySubject, bySection } = buildAnalytics(allQ);

    // 教科別（棒）
    const subjectItems = SUBJECTS.map(s => ({
      label: s.label,
      value: (bySubject.get(s.key)?.attempts || 0)
    }));
    drawBarChart(analytics.chartSubject, subjectItems, "教科別");

    // 節別（選択中の教科のみ）
    const curSubject = els.subject.value;
    const sectionItemsRaw = Array.from(bySection.values())
      .filter(x => x.subject === curSubject)
      .sort((a,b) => b.attempts - a.attempts)
      .slice(0, 12); // 多すぎると見えないので上位12

    const sectionItems = sectionItemsRaw.map(x => ({
      label: x.unit_section || "未設定",
      value: x.attempts
    }));
    drawBarChart(analytics.chartSection, sectionItems, "節別(上位)");

    // 不得意節ランキング：不正解が多い順（上位20）
    const weakRows = Array.from(bySection.values())
      .filter(x => x.wrong > 0)
      .sort((a,b) => b.wrong - a.wrong || b.attempts - a.attempts)
      .slice(0, 20)
      .map(x => ({
        ...x,
        subjectLabel: (SUBJECTS.find(s => s.key === x.subject)?.label || x.subject)
      }));

    renderWeakSectionsTable(weakRows);

    analytics.card.style.display = "";
    analytics.status.textContent = "分析を更新しました。";
  } catch (e) {
    analytics.status.textContent = "分析に失敗しました：" + (e?.message || e);
  }
};


  loadCatalog().catch(e => els.status.textContent = "初期読込失敗：" + e.message);
</script>

</body>
</html>
